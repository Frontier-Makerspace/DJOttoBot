<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROTO7YPE Visualizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Album art background */
    #album-art-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background-size: cover;
      background-position: center;
      filter: blur(40px) brightness(0.3);
      opacity: 0;
      transition: opacity 1.5s ease;
    }
    #album-art-bg.visible { opacity: 1; }

    /* BPM display */
    #bpm-display {
      position: fixed;
      top: 18px;
      right: 18px;
      text-align: center;
      font-family: 'Share Tech Mono', monospace;
      z-index: 20;
      pointer-events: none;
    }
    #bpm-number {
      font-size: 2.8rem;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 18px currentColor, 0 0 6px currentColor;
      line-height: 1;
      transition: color 0.8s ease;
    }
    #bpm-label {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.6);
      margin-top: 2px;
    }

    /* QR code */
    #qr-container {
      position: fixed;
      bottom: 55px;
      left: 18px;
      width: 120px;
      height: 120px;
      opacity: 0.6;
      z-index: 20;
      transition: opacity 0.3s;
    }
    #qr-container:hover { opacity: 0.9; }
    #qr-container img {
      width: 100%;
      height: 100%;
      border-radius: 6px;
      background: rgba(0,0,0,0.5);
    }

    /* Roast toast */
    #roast-toast {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: linear-gradient(135deg, rgba(180,30,0,0.92), rgba(100,10,0,0.92));
      border: 1px solid #ff4422;
      color: #fff;
      padding: 12px 22px;
      border-radius: 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 1rem;
      max-width: 500px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.4s, transform 0.4s;
      z-index: 50;
      pointer-events: none;
    }
    #roast-toast.active {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  
    /* YouTube video background */
    #yt-bg {
      position: fixed;
      inset: 0;
      z-index: -2;
      opacity: 0;
      transition: opacity 1.5s ease;
      pointer-events: none;
    }
    #yt-bg.visible { opacity: 1; }
    #yt-bg iframe {
      width: 100vw;
      height: 56.25vw; /* 16:9 */
      min-height: 100vh;
      min-width: 177.78vh;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: none;
      pointer-events: none;
    }
    /* Dim canvas when video is playing */
    #visualizer-canvas.video-active {
      opacity: 0.35;
    }
      #track-album {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.45);
      margin-top: 3px;
      font-family: 'Share Tech Mono', monospace;
    }
  </style>
</head>
<body>
  <!-- YouTube video background -->
  <div id=yt-bg></div>

  <!-- Album art blurred background -->
  <div id="album-art-bg"></div>

  <canvas id="visualizer-canvas"></canvas>
  <div id="top-bar" style="position: fixed; top: 0; left: 0; right: 0; height: 50px; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent); font-family: 'Share Tech Mono', monospace; z-index: 15; color: #0af; font-size: 0.9rem;">
    <div id="venue-and-time">
      <span id="venue-name" style="font-size: 1.2rem; margin-right: 2rem;">PROTO7YPE</span>
      <span id="top-clock" style="color: rgba(0,255,204,0.7);">00:00</span>
    </div>
    <div id="vibe-display" style="text-align: center;">
      <span id="vibe-badge-top" style="font-weight: bold; text-transform: uppercase; letter-spacing: 0.15em;">—</span>
    </div>
  </div>

  <!-- Party Mode Overlay (hidden by default) -->
  <div id="party-overlay" style="display: none; position: fixed; top: 60px; left: 0; right: 0; text-align: center; z-index: 25; pointer-events: none; font-family: 'Share Tech Mono', monospace;">
    <div id="party-name" style="font-size: 3.5rem; font-weight: bold; color: #fff; text-transform: uppercase; letter-spacing: 0.2em; text-shadow: 0 0 40px #f44, 0 0 80px #f44, 0 0 120px rgba(255,68,68,0.5);"></div>
    <div id="party-tagline" style="font-size: 1.2rem; color: #ff8888; margin-top: 8px; letter-spacing: 0.1em; text-shadow: 0 0 20px #f44;"></div>
  </div>
  
  <div id="venue-name" style="display: none;">PROTO7YPE</div>
  <div id="vibe-badge" style="display: none;"></div>

  <!-- BPM display top-right -->
  <div id="bpm-display">
    <div id="bpm-number">—</div>
    <div id="bpm-label">BPM</div>
  </div>

  <div id="now-playing">
    <div id="track-title"></div>
    <div id="track-artist"></div>
    <div id="track-album"></div>
  </div>
  <div id="mode-indicator">BOT</div>
  <div id="clock"></div>
  <div id="request-toast"></div>
  <div id="roast-toast"></div>

  <!-- QR Code bottom-left -->
  <div id="qr-container" style="display:none">
    <img id="qr-img" src="" alt="Scan to open on YouTube">
  </div>

  <div id="track-progress-bar">
    <div id="track-progress-fill"></div>
    <div id="track-progress-times">
      <span id="track-elapsed">0:00</span>
      <span id="track-remaining">0:00</span>
    </div>
  </div>
  <script src="visualizer.js"></script>
</body>
</html>
